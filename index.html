<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>たこ虎 売上管理</title>

<style>

:root{
--yellow:#ffdd00;
--black:#111;
--white:#fff;
--gray:#f3f3f3;
}

*{
box-sizing:border-box;
}

body{
margin:0;
background:var(--black);
font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;
color:#111;
}

header{
background:var(--yellow);
padding:20px;
text-align:center;
font-size:32px;
font-weight:900;
}

.wrap{
padding:18px;
max-width:700px;
margin:auto;
}

.tabs{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-bottom:20px;
}

.tab{
border:none;
border-radius:20px;
padding:18px;
font-size:28px;
font-weight:900;
background:#ddd;
}

.tab.active{
background:var(--yellow);
}

.card{
background:#f2f2f2;
border-radius:30px;
padding:22px;
}

.label{
font-size:20px;
font-weight:900;
margin-top:20px;
margin-bottom:10px;
}

input,
select{
width:100%;
padding:18px;
font-size:30px;
border-radius:20px;
border:2px solid #ccc;
}

.weather{
margin-top:18px;
font-size:20px;
font-weight:700;
background:#fff6b8;
padding:14px;
border-radius:16px;
}

.searchBox{
margin-top:20px;
}

.itemBtn{
display:inline-block;
margin:6px;
padding:14px 18px;
border:none;
border-radius:16px;
background:#222;
color:white;
font-size:18px;
font-weight:700;
}

.saveBtn{
width:100%;
margin-top:30px;
padding:22px;
border:none;
border-radius:22px;
background:var(--yellow);
font-size:34px;
font-weight:900;
}

.history{
margin-top:30px;
background:white;
padding:20px;
border-radius:22px;
}

.historyTitle{
font-size:24px;
font-weight:900;
margin-bottom:14px;
}

.historyRow{
display:flex;
justify-content:space-between;
padding:10px 0;
font-size:20px;
font-weight:700;
border-bottom:1px solid #ddd;
}

.backBtn{
margin-top:20px;
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:900;
background:#444;
color:white;
}

</style>
</head>

<body>

<header>
たこ虎 売上管理
</header>

<div class="wrap">

<div class="tabs">
<button class="tab active">入力</button>
<button class="tab">日別</button>
<button class="tab">年間</button>
</div>

<div class="card">

<div class="label">日付</div>

<input type="date">

<div class="label">現場名</div>

<select id="place">
<option>横浜</option>
<option>鎌倉八幡</option>
<option>高市</option>
<option>酉の市</option>
</select>

<div class="weather" id="weather">
天気：晴れ
</div>

<div class="label">品目検索</div>

<input
type="text"
id="search"
placeholder="たこ焼き など"
class="searchBox"
/>

<div id="items"></div>

<button class="saveBtn">
保存する
</button>

<div class="history">

<div class="historyTitle">
去年・一昨年比較
</div>

<div class="historyRow">
<div>去年</div>
<div id="year1">120,000円</div>
</div>

<div class="historyRow">
<div>一昨年</div>
<div id="year2">98,000円</div>
</div>

</div>

<button
class="backBtn"
onclick="history.back()"
>
戻る
</button>

</div>

</div>

<script>

const ITEMS = [
"たこ焼き",
"レモンサワー",
"からあげ",
"やきとり",
"いかやき",
"フランクフルト",
"かき氷",
"ハイボール"
];

const WEATHER = {
"横浜":"晴れ",
"鎌倉八幡":"くもり",
"高市":"雨",
"酉の市":"晴れ"
};

const place = document.getElementById("place");
const weather = document.getElementById("weather");

function updateWeather(){
weather.innerHTML =
"天気："+WEATHER[place.value];
}

place.addEventListener(
"change",
updateWeather
);

updateWeather();

const search =
document.getElementById("search");

const items =
document.getElementById("items");

function render(keyword=""){

items.innerHTML="";

ITEMS
.filter(v=>v.includes(keyword))
.forEach(v=>{

const btn =
document.createElement("button");

btn.className="itemBtn";

btn.textContent=v;

btn.onclick=()=>{
alert(v+" を選択");
};

items.appendChild(btn);

});

}

render();

search.addEventListener(
"input",
e=>render(e.target.value)
);

</script>

</body>
</html>
