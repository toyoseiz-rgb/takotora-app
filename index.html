<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>たこ虎 売上管理</title>

<meta name="theme-color" content="#ffd000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="たこ虎">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon.png.png">

<style>

:root{
 --yellow:#ffd000;
 --gold:#b88600;
 --black:#111;
}

*{
 box-sizing:border-box;
}

body{
 margin:0;
 background:#111;
 font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}

.header{
 background:linear-gradient(#ffe45c,#ffd000);
 border-bottom:6px solid var(--gold);
 padding:16px;
 text-align:center;
 position:sticky;
 top:0;
 z-index:100;
}

.header h1{
 margin:0;
 font-size:32px;
 font-weight:900;
}

.wrap{
 max-width:560px;
 margin:auto;
 padding:18px;
}

.card{
 background:#fff;
 border-radius:30px;
 padding:24px;
 margin-bottom:22px;
 box-shadow:0 5px 18px rgba(0,0,0,.25);
}

.logo{
 width:150px;
 height:150px;
 display:block;
 margin:18px auto;
 border-radius:36px;
}

.lockTitle{
 text-align:center;
 font-size:58px;
 font-weight:900;
 line-height:1.1;
 margin-bottom:12px;
}

.sub{
 text-align:center;
 font-size:20px;
 color:#666;
 margin-bottom:18px;
 font-weight:700;
}

label{
 display:block;
 font-size:20px;
 font-weight:900;
 margin:18px 0 8px;
}

input,textarea,select{
 width:100%;
 padding:18px;
 font-size:24px;
 border-radius:20px;
 border:2px solid #ddd;
 background:#fff;
}

textarea{
 height:90px;
}

.row{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
}

.btn{
 width:100%;
 background:var(--yellow);
 border:none;
 border-radius:24px;
 padding:22px;
 font-size:32px;
 font-weight:900;
 box-shadow:0 8px var(--gold);
 margin-top:24px;
}

.topBtns{
 display:flex;
 gap:10px;
 margin-bottom:14px;
}

.smallBtn{
 flex:1;
 background:var(--yellow);
 border:none;
 border-radius:16px;
 padding:14px;
 font-size:20px;
 font-weight:900;
 box-shadow:0 5px var(--gold);
}

.status{
 text-align:center;
 font-size:34px;
 font-weight:900;
 margin-top:18px;
}

.hidden{
 display:none;
}

</style>
</head>

<body>

<div class="header">
<h1>たこ虎 売上管理</h1>
</div>

<div class="wrap">

<section id="lockScreen" class="card">

<img src="apple-touch-icon.png" class="logo">

<div class="lockTitle">
たこ虎売上<br>
管理
</div>

<div class="sub">
暗証番号を入力
</div>

<input type="password" id="pinInput" placeholder="＊＊＊＊">

<button class="btn" onclick="unlock()">
開く
</button>

</section>

<section id="mainScreen" class="hidden">

<div class="topBtns">

<button class="smallBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">
↑ 上へ
</button>

<button class="smallBtn" onclick="lockAgain()">
ロック
</button>

</div>

<div class="card">

<label>日付</label>
<input type="date" id="date">

<label>現場名</label>
<input type="text" id="place" placeholder="例：横浜">

<div class="row">

<div>
<label>天気</label>
<input type="text" id="weather">
</div>

<div>
<label>風</label>
<select id="wind">
<option>なし</option>
<option>弱風</option>
<option>強風</option>
</select>
</div>

</div>

<label>品目</label>

<input type="text" id="item" list="items">

<datalist id="items">
<option value="たこ焼き">
<option value="やきとり">
<option value="からあげ">
<option value="いか焼き">
<option value="フランク">
<option value="レモンサワー">
<option value="ハイボール">
<option value="かき氷">
<option value="あげもち">
<option value="パイン">
</datalist>

<div class="row">

<div>
<label>売上</label>
<input type="number" id="sales" value="0">
</div>

<div>
<label>本数</label>
<input type="number" id="count" value="0">
</div>

</div>

<label>担当</label>
<input type="text" id="staff">

<div class="row">

<div>
<label>経費</label>
<input type="number" id="cost" value="0">
</div>

<div>
<label>返し</label>
<input type="number" id="back" value="0">
</div>

</div>

<label>メモ</label>
<textarea id="memo"></textarea>

<button class="btn" onclick="saveData()">
保存する
</button>

<div class="status" id="result"></div>

</div>

</section>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzNHU8NG8B0Uq0_LcN4rpEi2-wqm-Y3LZpyxIeKQ-SIHGBFTjKGaKsvPOctGTFq4nFuMg/exec";

const PIN="2931";

document.getElementById("date").value=
new Date().toISOString().slice(0,10);

if(localStorage.getItem("takotoraUnlock")==="1"){
 showMain();
}

document.getElementById("pinInput")
.addEventListener("keydown",e=>{
 if(e.key==="Enter"){
  unlock();
 }
});

function unlock(){

 const v=document.getElementById("pinInput")
 .value.trim();

 if(v===PIN){

  localStorage.setItem("takotoraUnlock","1");

  showMain();

 }else{

  alert("暗証番号が違います");

 }

}

function showMain(){

 document.getElementById("lockScreen")
 .style.display="none";

 document.getElementById("mainScreen")
 .classList.remove("hidden");

 loadWeather();

}

function lockAgain(){

 localStorage.removeItem("takotoraUnlock");

 location.reload();

}

async function loadWeather(){

 try{

  const place=
  document.getElementById("place").value
  ||"横浜";

  const res=
  await fetch(
   "https://wttr.in/"
   +encodeURIComponent(place)
   +"?format=%C"
  );

  const text=await res.text();

  document.getElementById("weather")
  .value=text;

 }catch(e){

  document.getElementById("weather")
  .value="晴れ";

 }

}

document.getElementById("place")
.addEventListener("blur",loadWeather);

async function saveData(){

 const data={

  date:
  document.getElementById("date").value,

  place:
  document.getElementById("place").value,

  weather:
  document.getElementById("weather").value,

  wind:
  document.getElementById("wind").value,

  item:
  document.getElementById("item").value,

  sales:
  document.getElementById("sales").value,

  count:
  document.getElementById("count").value,

  staff:
  document.getElementById("staff").value,

  cost:
  document.getElementById("cost").value,

  back:
  document.getElementById("back").value,

  memo:
  document.getElementById("memo").value

 };

 document.getElementById("result")
 .innerText="保存中...";

 try{

  await fetch(API_URL,{
   method:"POST",
   mode:"no-cors",
   body:JSON.stringify(data)
  });

  document.getElementById("result")
  .innerText="保存完了";

 }catch(e){

  document.getElementById("result")
  .innerText="保存失敗";

 }

}

</script>

</body>
</html>
