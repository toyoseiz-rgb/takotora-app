<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>たこ虎 売上管理</title>

<meta name="theme-color" content="#ffd000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="たこ虎">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon.png.png">

<style>
body{
margin:0;
background:#111;
font-family:sans-serif;
color:#111;
}

.wrap{
max-width:560px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
border-radius:28px;
padding:24px;
margin-top:20px;
}

.logo{
width:130px;
display:block;
margin:auto;
}

h1{
text-align:center;
font-size:52px;
margin:10px 0 0;
}

.sub{
text-align:center;
font-size:18px;
font-weight:bold;
color:#555;
margin-bottom:20px;
}

input,select{
width:100%;
padding:18px;
font-size:20px;
border-radius:18px;
border:2px solid #ddd;
margin-bottom:14px;
box-sizing:border-box;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:22px;
background:#ffd000;
font-size:30px;
font-weight:bold;
cursor:pointer;
box-shadow:0 6px #bb8800;
}

.total{
font-size:34px;
font-weight:bold;
text-align:right;
margin-top:10px;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="wrap">

<div id="lockScreen" class="card">

<img src="icon.png.png" class="logo">

<h1>たこ虎売上管理</h1>

<div class="sub">暗証番号を入力</div>

<input type="password" id="pinInput" placeholder="＊＊＊＊">

<button onclick="unlock()">開く</button>

</div>

<div id="mainScreen" class="hidden">

<div class="card">

<label>日付</label>
<input type="date" id="date">

<label>現場名</label>
<input type="text" id="place">

<label>天気</label>
<select id="weather">
<option>晴れ</option>
<option>曇り</option>
<option>雨</option>
<option>強風</option>
</select>

<label>品目</label>
<input type="text" id="item">

<label>売上</label>
<input type="number" id="sales" value="0">

<label>本数</label>
<input type="number" id="count" value="0">

<label>担当</label>
<input type="text" id="staff">

<label>経費</label>
<input type="number" id="cost" value="0">

<label>返し</label>
<input type="number" id="back" value="0">

<label>メモ</label>
<input type="text" id="memo">

<button onclick="saveData()">保存する</button>

<div class="total" id="result"></div>

</div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzNHU8NG8B0Uq0_LcN4rpEi2-wqm-Y3LZpyxIeKQ-SIHGBFTjKGaKsvPOctGTFq4nFuMg/exec";

const PIN = "2931";

document.getElementById("date").value =
new Date().toISOString().slice(0,10);

if(localStorage.getItem("takotoraUnlock")=="1"){
document.getElementById("lockScreen").style.display="none";
document.getElementById("mainScreen").classList.remove("hidden");
}

function unlock(){

const v=document.getElementById("pinInput").value.trim();

if(v===PIN){

localStorage.setItem("takotoraUnlock","1");

document.getElementById("lockScreen").style.display="none";

document.getElementById("mainScreen").classList.remove("hidden");

}else{

alert("暗証番号が違います");

}

}

async function saveData(){

const data={

date:document.getElementById("date").value,
place:document.getElementById("place").value,
weather:document.getElementById("weather").value,
item:document.getElementById("item").value,
sales:Number(document.getElementById("sales").value||0),
count:Number(document.getElementById("count").value||0),
staff:document.getElementById("staff").value,
cost:Number(document.getElementById("cost").value||0),
back:Number(document.getElementById("back").value||0),
memo:document.getElementById("memo").value

};

document.getElementById("result").innerText="保存中...";

try{

await fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
});

document.getElementById("result").innerText="保存完了";

}catch(e){

document.getElementById("result").innerText="保存失敗";

}

}

</script>

</body>
</html>
