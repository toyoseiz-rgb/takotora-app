<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たこ虎 売上管理</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #fff8d8;
  color: #222;
}
header {
  background: #ffd400;
  color: #111;
  padding: 16px;
  text-align: center;
  font-size: 24px;
  font-weight: 900;
  border-bottom: 5px solid #111;
}
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 14px;
}
.card {
  background: #fffdf0;
  border: 2px solid #111;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 3px 3px 0 #111;
}
h2, h3 { margin: 0 0 12px 0; }
label {
  display: block;
  margin-top: 10px;
  font-weight: 800;
}
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border: 2px solid #111;
  border-radius: 10px;
  font-size: 16px;
  background: #fff;
}
textarea { min-height: 80px; }
button {
  padding: 12px;
  border: 2px solid #111;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 900;
  background: #ffd400;
  color: #111;
  cursor: pointer;
  box-shadow: 2px 2px 0 #111;
}
button.dark {
  background: #111;
  color: #fff;
}
button.gray {
  background: #eeeeee;
  color: #111;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.itemGrid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.itemGrid button { min-height: 58px; }
.notice {
  background: #fff2a8;
  border: 2px solid #111;
  border-radius: 10px;
  padding: 10px;
  margin-top: 10px;
  white-space: pre-wrap;
}
.saleItem {
  border: 2px solid #111;
  border-radius: 10px;
  padding: 10px;
  margin-top: 10px;
  background: #fff;
}
.total {
  font-size: 26px;
  font-weight: 900;
  text-align: center;
  padding: 14px;
  background: #ffd400;
  color: #111;
  border: 2px solid #111;
  border-radius: 12px;
  margin-top: 12px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: #fff;
}
th, td {
  border: 1px solid #111;
  padding: 8px;
  text-align: right;
}
th:first-child, td:first-child { text-align: left; }
th {
  background: #ffd400;
  color: #111;
}
.small {
  font-size: 13px;
  color: #555;
}
@media (max-width: 700px) {
  .grid, .itemGrid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<header>🐙 たこ虎 売上管理</header>

<div class="container">

<div class="card">
  <h2>売上入力</h2>

  <label>日付</label>
  <input type="date" id="saleDate">

  <label>現場</label>
  <select id="siteSelect" onchange="changeSite()"></select>

  <div class="notice">
    <b>天気場所：</b><span id="weatherPlace">-</span><br>
    <b>天気：</b><span id="weatherText">-</span>
  </div>

  <div class="grid" style="margin-top:10px;">
    <button class="dark" onclick="fetchWeather()">天気再取得</button>
    <button class="gray" onclick="clearInput()">入力クリア</button>
  </div>
</div>

<div class="card">
  <h3>品目ボタン</h3>
  <div id="itemButtons" class="itemGrid"></div>
</div>

<div class="card">
  <h3>入力中の明細</h3>
  <div id="saleItems"></div>
  <div class="total">合計 <span id="totalAmount">0</span> 円</div>

  <label>メモ</label>
  <textarea id="memo" placeholder="混雑、雨、売れ筋など"></textarea>

  <button style="width:100%; margin-top:12px;" onclick="saveSale()">スプレッドシートへ保存</button>
  <div id="saveMsg" class="notice" style="display:none;"></div>
</div>

<div class="card">
  <h3>年間売上・比較</h3>
  <div class="grid">
    <button onclick="loadAnnual()">今年の年間集計</button>
    <button class="dark" onclick="loadHistory()">同現場 去年・一昨年</button>
  </div>
  <div id="summaryBox"></div>
</div>

</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzNHU8NG8B0Uq0_LcN4rpEi2-wqm-Y3LZpyxIeKQ-SIHGBFTjKGaKsvPOctGTFq4nFuMg/exec';
const PIN = '2931';

let masters = { sites: [], items: [] };
let saleItems = [];

window.addEventListener('load', init);

function yen(n) {
  return Number(n || 0).toLocaleString('ja-JP');
}

function today() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 99999);
    params.callback = cb;
    const url = API_URL + '?' + new URLSearchParams(params).toString();
    const script = document.createElement('script');

    window[cb] = function(data) {
      delete window[cb];
      script.remove();
      if (!data || data.ok === false) {
        reject(new Error((data && data.error) ? data.error : 'エラー'));
      } else {
        resolve(data);
      }
    };

    script.onerror = function() {
      delete window[cb];
      script.remove();
      reject(new Error('通信失敗'));
    };

    script.src = url;
    document.body.appendChild(script);
  });
}

async function init() {
  document.getElementById('saleDate').value = today();
  document.getElementById('saveMsg').style.display = 'none';

  try {
    masters = await jsonp({ action: 'masters', pin: PIN });
    renderMasters();
    changeSite();
  } catch (e) {
    alert('マスター読込失敗：' + e.message);
  }
}

function renderMasters() {
  const siteSelect = document.getElementById('siteSelect');
  siteSelect.innerHTML = masters.sites.map(s => {
    const name = s['現場名'];
    return '<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + '</option>';
  }).join('');

  const itemButtons = document.getElementById('itemButtons');
  itemButtons.innerHTML = masters.items.map(i => {
    const name = i['品目名'];
    const price = Number(i['標準単価'] || 0);
    return '<button onclick="addItem(\'' + escapeJs(name) + '\',' + price + ')">' + escapeHtml(name) + '<br><span class="small">' + yen(price) + '円</span></button>';
  }).join('');
}

function changeSite() {
  const siteName = document.getElementById('siteSelect').value;
  const site = masters.sites.find(s => s['現場名'] === siteName);
  const place = site ? (site['天気場所'] || siteName) : siteName;
  document.getElementById('weatherPlace').textContent = place || '-';
  fetchWeather();
}

async function fetchWeather() {
  const place = document.getElementById('weatherPlace').textContent.trim();
  const weatherText = document.getElementById('weatherText');

  if (!place || place === '-') {
    weatherText.textContent = '天気場所なし';
    return;
  }

  weatherText.textContent = '取得中...';

  try {
    const geoUrl = 'https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(place) + '&count=1&language=ja&format=json';
    const geo = await fetch(geoUrl).then(r => r.json());

    if (!geo.results || geo.results.length === 0) {
      weatherText.textContent = '場所が見つかりません';
      return;
    }

    const loc = geo.results[0];
    const weatherUrl = 'https://api.open-meteo.com/v1/forecast?latitude=' + loc.latitude + '&longitude=' + loc.longitude + '&current_weather=true&timezone=Asia%2FTokyo';
    const data = await fetch(weatherUrl).then(r => r.json());

    if (!data.current_weather) {
      weatherText.textContent = '天気取得不可';
      return;
    }

    const w = data.current_weather;
    weatherText.textContent = weatherCodeText(w.weathercode) + ' / ' + w.temperature + '℃ / 風速' + w.windspeed + 'm';
  } catch(e) {
    weatherText.textContent = '取得失敗';
  }
}

function weatherCodeText(code) {
  const map = {
    0: '快晴',
    1: '晴れ',
    2: '一部くもり',
    3: 'くもり',
    45: '霧',
    48: '霧氷',
    51: '小雨',
    53: '小雨',
    55: '強い小雨',
    61: '雨',
    63: '雨',
    65: '強い雨',
    71: '雪',
    73: '雪',
    75: '強い雪',
    80: 'にわか雨',
    81: 'にわか雨',
    82: '強いにわか雨',
    95: '雷雨',
    96: '雷雨・ひょう',
    99: '強い雷雨・ひょう'
  };
  return map[code] || '天気コード' + code;
}

function addItem(name, price) {
  const existing = saleItems.find(i => i.name === name);
  if (existing) {
    existing.qty += 1;
    existing.amount = existing.qty * existing.price;
  } else {
    saleItems.push({ name: name, qty: 1, price: Number(price || 0), amount: Number(price || 0) });
  }
  renderSaleItems();
}

function renderSaleItems() {
  const box = document.getElementById('saleItems');
  box.innerHTML = saleItems.map((i, idx) => {
    return '<div class="saleItem">' +
      '<b>' + escapeHtml(i.name) + '</b>' +
      '<label>数量</label><input type="number" value="' + i.qty + '" onchange="changeQty(' + idx + ', this.value)">' +
      '<label>単価</label><input type="number" value="' + i.price + '" onchange="changePrice(' + idx + ', this.value)">' +
      '<div><b>売上：' + yen(i.amount) + '円</b></div>' +
      '<button class="gray" style="width:100%; margin-top:8px;" onclick="removeItem(' + idx + ')">削除</button>' +
    '</div>';
  }).join('');
  updateTotal();
}

function changeQty(idx, value) {
  saleItems[idx].qty = Number(value || 0);
  saleItems[idx].amount = saleItems[idx].qty * saleItems[idx].price;
  renderSaleItems();
}

function changePrice(idx, value) {
  saleItems[idx].price = Number(value || 0);
  saleItems[idx].amount = saleItems[idx].qty * saleItems[idx].price;
  renderSaleItems();
}

function removeItem(idx) {
  saleItems.splice(idx, 1);
  renderSaleItems();
}

function updateTotal() {
  const total = saleItems.reduce((sum, i) => sum + Number(i.amount || 0), 0);
  document.getElementById('totalAmount').textContent = yen(total);
}

function clearInput() {
  saleItems = [];
  document.getElementById('memo').value = '';
  document.getElementById('saveMsg').style.display = 'none';
  renderSaleItems();
}

async function saveSale() {
  const msg = document.getElementById('saveMsg');

  if (saleItems.length === 0) {
    alert('品目を押してください');
    return;
  }

  const payload = {
    date: document.getElementById('saleDate').value,
    site: document.getElementById('siteSelect').value,
    weatherPlace: document.getElementById('weatherPlace').textContent,
    weather: document.getElementById('weatherText').textContent,
    memo: document.getElementById('memo').value,
    items: saleItems
  };

  msg.style.display = 'block';
  msg.textContent = '保存中...';

  try {
    const res = await jsonp({ action: 'saveSale', pin: PIN, payload: JSON.stringify(payload) });
    msg.textContent = '保存しました\n合計：' + yen(res.total) + '円\n保存ID：' + res.saveId;
    saleItems = [];
    document.getElementById('memo').value = '';
    renderSaleItems();
  } catch(e) {
    msg.textContent = '保存失敗：' + e.message;
  }
}

async function loadAnnual() {
  const box = document.getElementById('summaryBox');
  box.innerHTML = '<div class="notice">集計中...</div>';

  try {
    const year = new Date().getFullYear();
    const res = await jsonp({ action: 'annual', pin: PIN, year: year });

    let html = '<div class="notice"><b>' + year + '年 年間売上：</b>' + yen(res.total) + '円<br>' +
      '<b>前年：</b>' + yen(res.prevTotal) + '円<br>' +
      '<b>前年比：</b>' + yen(res.diffPrev) + '円</div>';

    html += '<table><tr><th>月</th><th>売上</th></tr>';
    res.monthly.forEach(m => {
      html += '<tr><td>' + m.month + '月</td><td>' + yen(m.amount) + '円</td></tr>';
    });
    html += '</table>';

    box.innerHTML = html;
  } catch(e) {
    box.innerHTML = '<div class="notice">集計失敗：' + escapeHtml(e.message) + '</div>';
  }
}

async function loadHistory() {
  const box = document.getElementById('summaryBox');
  box.innerHTML = '<div class="notice">読込中...</div>';

  try {
    const year = new Date().getFullYear();
    const site = document.getElementById('siteSelect').value;
    const res = await jsonp({ action: 'history', pin: PIN, year: year, site: site });

    let html = '<div class="notice"><b>同現場比較：</b>' + escapeHtml(site) + '</div>';
    res.history.forEach(h => {
      html += '<div class="notice"><b>' + h.year + '年</b><br>売上：' + yen(h.total) + '円</div>';
    });
    box.innerHTML = html;
  } catch(e) {
    box.innerHTML = '<div class="notice">比較失敗：' + escapeHtml(e.message) + '</div>';
  }
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function escapeJs(str) {
  return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}
</script>
</body>
</html>
