<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>たこ虎 売上管理</title>
<meta name="theme-color" content="#ffd000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="たこ虎">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=10">

<style>
:root{--yellow:#ffd000;--gold:#b88600;--black:#111}
*{box-sizing:border-box}
body{margin:0;background:#111;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;color:#111}
.header{position:sticky;top:0;z-index:50;background:linear-gradient(#ffe45c,#ffd000);border-bottom:6px solid var(--gold);padding:16px;text-align:center}
.header h1{margin:0;font-size:30px;font-weight:900}
.wrap{max-width:560px;margin:auto;padding:16px}
.card{background:#fff;border-radius:28px;padding:20px;margin:14px 0 22px;box-shadow:0 4px 18px rgba(0,0,0,.25)}
.logo{width:140px;height:140px;display:block;margin:14px auto;border-radius:32px}
.lockTitle{font-size:42px;font-weight:900;text-align:center;line-height:1.12}
.sub{text-align:center;font-size:20px;font-weight:800;color:#666;margin:12px 0}
label{display:block;font-size:20px;font-weight:900;margin:15px 0 8px}
input,select,textarea{width:100%;padding:15px;font-size:21px;border-radius:17px;border:2px solid #ddd;background:#fff}
textarea{height:82px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:18px;border:none;border-radius:22px;background:var(--yellow);font-size:29px;font-weight:900;box-shadow:0 7px var(--gold);margin-top:18px}
.btnSmall{padding:11px 10px;border:none;border-radius:14px;background:var(--yellow);font-size:17px;font-weight:900;box-shadow:0 4px var(--gold)}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.tab{background:#fff;border:none;border-radius:16px;padding:13px 6px;font-size:18px;font-weight:900;box-shadow:0 4px #aaa}
.tab.active{background:var(--yellow);box-shadow:0 4px var(--gold)}
.hidden{display:none!important}
.notice{font-size:15px;background:#fff7c7;border:2px solid #ffd000;border-radius:14px;padding:10px;margin:10px 0;font-weight:900}
.itemBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.itemBtn,.linkBtn{border:none;background:#111;color:#ffd000;border-radius:14px;padding:12px;font-size:17px;font-weight:900;margin:3px}
.itemBox{border:3px solid #111;border-radius:18px;padding:12px;margin:12px 0;background:#fff}
.itemHead{display:flex;justify-content:space-between;align-items:center;font-weight:900;font-size:18px;margin-bottom:8px}
.delBtn{border:none;background:#ddd;border-radius:12px;padding:8px 12px;font-size:15px;font-weight:900}
.status{text-align:center;font-size:28px;font-weight:900;margin-top:14px}
.fold{background:#fff;border:2px solid #eee;border-radius:18px;padding:12px;margin:10px 0}
.foldHead{font-size:18px;font-weight:900;cursor:pointer;list-style:none}
.foldHead::-webkit-details-marker{display:none}
.foldBody{margin-top:10px;border-top:1px solid #eee;padding-top:10px}
.line{display:flex;justify-content:space-between;gap:12px;padding:5px 0;font-size:16px}
.line b{font-size:18px}
.summary{font-size:22px;font-weight:900;line-height:1.65;margin-bottom:12px}
hr{border:none;border-top:1px solid #eee;margin:10px 0}
</style>
</head>

<body>
<div class="header"><h1>たこ虎 売上管理</h1></div>

<div class="wrap">

<section id="lockScreen" class="card">
  <img src="icon.png.png?v=20" class="logo">
  <div class="lockTitle">たこ虎 売上管理</div>
  <div class="sub">暗証番号を入力</div>
  <input type="password" id="pinInput" inputmode="numeric" maxlength="4" placeholder="＊＊＊＊">
  <button class="btn" onclick="unlock()">開く</button>
</section>

<section id="mainScreen" class="hidden">
  <div class="tabs">
    <button id="tabInput" class="tab active" onclick="showScreen('input')">入力</button>
    <button id="tabDaily" class="tab" onclick="showScreen('daily')">日別</button>
    <button id="tabYearly" class="tab" onclick="showScreen('yearly')">年間</button>
  </div>

  <section id="inputScreen">
    <div class="card">
      <label>日付</label>
      <input type="date" id="date">

      <label>現場名</label>
      <input type="text" id="place" list="placeList" placeholder="現場名を入力">
      <datalist id="placeList"></datalist>

      <div id="recentItems" class="notice hidden"></div>

      <div class="row">
        <div>
          <label>天気</label>
         <input type="text" id="weather" placeholder="天気自動取得">
        </div>
        <div>
          <label>風</label>
         <input type="text" id="wind" placeholder="風速自動取得">
        </div>
      </div>

      <label>品目</label>
      <datalist id="itemList"></datalist>
      <div id="itemButtons" class="itemBtns"></div>
      <div id="itemsArea"></div>
      <button class="btnSmall" onclick="addItemRow()">＋ 品目追加</button>

      <div class="row">
        <div>
          <label>経費単価</label>
          <input type="number" id="cost" oninput="updateCostPreview()">
        </div>
        <div>
          <label>本数</label>
          <input type="number" id="count" oninput="updateCostPreview()">
        </div>
      </div>

      <div class="notice" id="costPreview">経費 0円 × 0本 = 0円</div>

      <label>返し</label>
      <input type="number" id="back">

      <label>メモ</label>
      <textarea id="memo"></textarea>

      <button class="btn" onclick="saveData()">保存する</button>
      <div class="status" id="result"></div>
    </div>
  </section>

  <section id="dailyScreen" class="hidden">
    <div class="card">
      <div class="notice">日別は確認専用。最新が上、直近だけ開きます。</div>
      <div id="dailyArea">読み込み中...</div>
    </div>
  </section>

  <section id="yearlyScreen" class="hidden">
    <div class="card">
      <label>表示年</label>
      <select id="yearSelect" onchange="renderYearly()"></select>
      <div class="notice">年間は確認専用。1月から12月順、当月だけ開きます。</div>
      <div id="yearlyArea">読み込み中...</div>
    </div>
  </section>
</section>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzNHU8NG8B0Uq0_LcN4rpEi2-wqm-Y3LZpyxIeKQ-SIHGBFTjKGaKsvPOctGTFq4nFuMg/exec";
const PIN = "2931";

let allRows = [];
let placeMasters = [];
let itemMasters = [];
let weatherTimer = null;
let geoCache = {};

document.getElementById("date").value = localDate();
document.getElementById("pinInput").addEventListener("keydown", e => {
  if (e.key === "Enter") unlock();
});
document.getElementById("place").addEventListener("input", () => {
  showRecentItems();
  scheduleWeatherAutoFill();
});
document.getElementById("date").addEventListener("change", () => {
  scheduleWeatherAutoFill();
});

if (localStorage.getItem("takotoraUnlock") === "1") showMain();
addItemRow();

function unlock(){
  if(document.getElementById("pinInput").value.trim() === PIN){
    localStorage.setItem("takotoraUnlock","1");
    showMain();
  }else{
    alert("暗証番号が違います");
  }
}

function showMain(){
  document.getElementById("lockScreen").style.display="none";
  document.getElementById("mainScreen").classList.remove("hidden");
  refreshAll();
}

function showScreen(name){
  ["input","daily","yearly"].forEach(n=>{
    document.getElementById(n+"Screen").classList.toggle("hidden", n !== name);
    document.getElementById("tab"+cap(n)).classList.toggle("active", n === name);
  });
  if(name==="daily") renderDaily();
  if(name==="yearly") renderYearly();
  window.scrollTo({top:0,behavior:"smooth"});
}

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*9999);
    window[cb] = data => {
      delete window[cb];
      script.remove();
      resolve(data);
    };
    const script = document.createElement("script");
    script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
    script.onerror = reject;
    document.body.appendChild(script);
  });
}

async function refreshAll(){
  try{
    const data = await jsonp(API_URL + "?action=list");
    if(data && data.ok){
      allRows = data.sales || [];
      placeMasters = data.places || [];
      itemMasters = data.items || [];
      setupMasters();
      setupYears();
      renderDaily();
      renderYearly();
      showRecentItems();
      scheduleWeatherAutoFill();
    }
  }catch(e){
    console.log(e);
  }
}

function setupMasters(){
  document.getElementById("placeList").innerHTML =
    placeMasters.map(p => `<option value="${escapeHtml(p["現場名"])}">`).join("");

  document.getElementById("itemList").innerHTML =
    itemMasters.map(i => `<option value="${escapeHtml(i["品目"])}">`).join("");

  document.getElementById("itemButtons").innerHTML =
    itemMasters.slice(0,10).map(i =>
      `<button class="itemBtn" onclick="setItem('${escapeAttr(i["品目"])}')">${escapeHtml(i["品目"])}</button>`
    ).join("");
}

function addItemRow(name){
  const area = document.getElementById("itemsArea");
  const no = area.querySelectorAll(".itemBox").length + 1;

  const box = document.createElement("div");
  box.className = "itemBox";
  box.innerHTML = `
    <div class="itemHead">
      <span>品目 ${no}</span>
      <button type="button" class="delBtn" onclick="removeItemRow(this)">削除</button>
    </div>
    <label>品目名</label>
    <input type="text" class="itemName" list="itemList" placeholder="例：やきとり" value="${escapeHtml(name || "")}">
    <label>売上</label>
    <input type="number" class="itemSales">
    <label>担当</label>
    <input type="text" class="itemStaff">
  `;

  area.appendChild(box);
  renumberItems();
}

function removeItemRow(btn){
  const area = document.getElementById("itemsArea");
  if(area.querySelectorAll(".itemBox").length <= 1){
    const box = btn.closest(".itemBox");
    box.querySelector(".itemName").value = "";
    box.querySelector(".itemSales").value = "";
    box.querySelector(".itemStaff").value = "";
    return;
  }
  btn.closest(".itemBox").remove();
  renumberItems();
}

function renumberItems(){
  document.querySelectorAll(".itemBox").forEach((box,i)=>{
    box.querySelector(".itemHead span").innerText = "品目 " + (i+1);
  });
}

function setItem(name){
  const rows = [...document.querySelectorAll(".itemBox")];
  let target = rows.find(box => !box.querySelector(".itemName").value.trim());

  if(!target){
    addItemRow(name);
    return;
  }

  target.querySelector(".itemName").value = name;
}

function getInputItems(){
  return [...document.querySelectorAll(".itemBox")].map(box => ({
    name: box.querySelector(".itemName").value.trim(),
    sales: Number(box.querySelector(".itemSales").value || 0),
    staff: box.querySelector(".itemStaff").value.trim()
  })).filter(i => i.name || i.sales || i.staff);
}

function showRecentItems(){
  const place = document.getElementById("place").value.trim();
  const box = document.getElementById("recentItems");

  if(!place){
    box.classList.add("hidden");
    return;
  }

  const rows = allRows
    .filter(r => r.place === place)
    .sort((a,b) => String(b.date).localeCompare(String(a.date)));

  if(!rows.length){
    box.classList.add("hidden");
    return;
  }

  const latestDate = rows[0].date;
  const items = [...new Set(rows.filter(r => r.date === latestDate).map(r => r.item).filter(Boolean))];

  if(!items.length){
    box.classList.add("hidden");
    return;
  }

  box.classList.remove("hidden");
  box.innerHTML = "直近の品目候補<br>" +
    items.map(i => `<button class="linkBtn" onclick="setItem('${escapeAttr(i)}')">${escapeHtml(i)}</button>`).join("");
}

function getWeatherLocationByPlace(place){
  const name = String(place || "").trim();
  if(!name) return "";

  const hit = placeMasters.find(p => String(p["現場名"] || "").trim() === name);
  if(!hit) return "";

  return String(hit["天気場所"] || "").trim();
}

function scheduleWeatherAutoFill(){
  clearTimeout(weatherTimer);
  weatherTimer = setTimeout(fetchWeatherByInput, 500);
}

async function fetchWeatherByInput(){
  const date = val("date");
  const place = val("place");
  const weatherLocation = getWeatherLocationByPlace(place);

  if(!date || !place || !weatherLocation) return;

  try{
    const result = await getSimpleWeather(weatherLocation, date);
    if(!result) return;

    document.getElementById("weather").value = result.weather || "";
    document.getElementById("wind").value = result.wind || "";
  }catch(e){
    console.log(e);
  }
}

async function getSimpleWeather(location, date){
  const geo = await getGeo(location);
  if(!geo) return null;

  const today = localDate();
  const base = date < today
    ? "https://archive-api.open-meteo.com/v1/archive"
    : "https://api.open-meteo.com/v1/forecast";

  const url =
    base +
    "?latitude=" + encodeURIComponent(geo.latitude) +
    "&longitude=" + encodeURIComponent(geo.longitude) +
    "&start_date=" + encodeURIComponent(date) +
    "&end_date=" + encodeURIComponent(date) +
    "&daily=weather_code,wind_speed_10m_max" +
    "&timezone=Asia%2FTokyo";

  const res = await fetch(url);
  const data = await res.json();

  const code = data && data.daily && data.daily.weather_code ? data.daily.weather_code[0] : null;
  const windSpeed = data && data.daily && data.daily.wind_speed_10m_max ? Number(data.daily.wind_speed_10m_max[0] || 0) : 0;

  return {
   weather: current.weathercode + "",
wind: windSpeed + "m/s"
  };
}

async function getGeo(location){
  const key = String(location || "").trim();
  if(!key) return null;
  if(geoCache[key]) return geoCache[key];

  const url =
    "https://geocoding-api.open-meteo.com/v1/search" +
    "?name=" + encodeURIComponent(key) +
    "&count=1&language=ja&format=json";

  const res = await fetch(url);
  const data = await res.json();

  if(!data || !data.results || !data.results.length) return null;

  geoCache[key] = {
    latitude: data.results[0].latitude,
    longitude: data.results[0].longitude
  };

  return geoCache[key];
}


}

function windFromSpeed(speed){
  if(speed >= 10) return "強風";
  if(speed >= 5) return "風あり";
  return "";
}

function updateCostPreview(){
  const cost = Number(val("cost") || 0);
  const count = Number(val("count") || 0)
  document.getElementById("costPreview").innerText =
    "経費 " + yen(cost) + " × " + count + "本 = " + yen(cost * count);
}

async function saveData(){
  const items = getInputItems();

  if(!items.length){
    alert("品目を1つ以上入力してください");
    return;
  }

  const data = {
    date: val("date"),
    place: val("place"),
    weatherLocation: getWeatherLocationByPlace(val("place")),
    weather: val("weather"),
    wind: val("wind"),
    items: items,
    costUnit: Number(val("cost") || 0),
    count: Number(val("count") || 0),
    back: Number(val("back") || 0),
    memo: val("memo")
  };

  document.getElementById("result").innerText = "保存中...";

  try{
    await fetch(API_URL, {
      method:"POST",
      mode:"no-cors",
      body: JSON.stringify(data)
    });

    document.getElementById("result").innerText = "保存完了";
    clearForm();
    setTimeout(refreshAll, 900);
  }catch(e){
    document.getElementById("result").innerText = "保存失敗";
  }
}

function clearForm(){
  ["place","weather","cost","count","back","memo"].forEach(id=>{
    document.getElementById(id).value = "";
  });

  document.getElementById("date").value = localDate();
  document.getElementById("wind").value = "";
  document.getElementById("recentItems").classList.add("hidden");
  document.getElementById("itemsArea").innerHTML = "";
  addItemRow();
  updateCostPreview();
}

function val(id){
  return document.getElementById(id).value;
}

function setupYears(){
  const y = document.getElementById("yearSelect");
  const years = [...new Set(allRows.map(r => String(r.date).slice(0,4)).filter(Boolean))].sort().reverse();
  const now = String(new Date().getFullYear());

  if(!years.includes(now)) years.unshift(now);

  y.innerHTML = years.map(v => `<option value="${v}">${v}年</option>`).join("");
}

function renderDaily(){
  const area = document.getElementById("dailyArea");

  if(!allRows.length){
    area.innerHTML = "データなし";
    return;
  }

  const groups = groupByDayPlace(allRows)
    .sort((a,b) => String(b.date).localeCompare(String(a.date)));

  area.innerHTML = groups.map((g,i) => dayFold(g, i===0)).join("");
}

function dayFold(g, open){
  return `
    <details class="fold" ${open ? "open" : ""}>
      <summary class="foldHead">${g.date}（${weekday(g.date)}） ${escapeHtml(g.place)} ${escapeHtml(g.weather)} ${yen(g.total)}</summary>
      <div class="foldBody">
        ${g.rows.map(r => `
          <div class="line">
            <span>${escapeHtml(r.item)}　${escapeHtml(r.staff || "")}</span>
            <b>${yen(r.sales)}</b>
          </div>
        `).join("")}
        <hr>
        <div class="line"><span>売上</span><b>${yen(g.total)}</b></div>
        <div class="line"><span>経費 ${yen(g.cost)} × ${g.count}本 = ${yen(g.costTotal)}　返し ${yen(g.back)}</span><b></b></div>
      </div>
    </details>`;
}

function renderYearly(){
  const year = document.getElementById("yearSelect").value || String(new Date().getFullYear());
  const rows = allRows.filter(r => String(r.date).startsWith(year));
  const area = document.getElementById("yearlyArea");

  const groups = groupByDayPlace(rows);
  const total = sum(rows,"sales");
  const costTotal = groups.reduce((a,g) => a + Number(g.costTotal || 0), 0);
  const backTotal = groups.reduce((a,g) => a + Number(g.back || 0), 0);

  let html = `
    <div class="summary">
      ${year}年<br>
      売上　${yen(total)}<br>
      経費　${yen(costTotal)}　返し　${yen(backTotal)}
    </div>
  `;

  for(let m=1; m<=12; m++){
    const mm = String(m).padStart(2,"0");
    const mr = rows.filter(r => String(r.date).slice(5,7) === mm);
    if(!mr.length) continue;

    const mg = groupByDayPlace(mr);
    const monthCost = mg.reduce((a,g) => a + Number(g.costTotal || 0), 0);
    const monthBack = mg.reduce((a,g) => a + Number(g.back || 0), 0);
    const isCurrent = year === String(new Date().getFullYear()) && m === new Date().getMonth()+1;

    html += `
      <details class="fold" ${isCurrent ? "open" : ""}>
        <summary class="foldHead">${m}月　${yen(sum(mr,"sales"))}</summary>
        <div class="foldBody">
          <div class="line"><span>経費 ${yen(monthCost)}　返し ${yen(monthBack)}</span><b></b></div>
          ${renderPlacesInMonth(mr)}
        </div>
      </details>
    `;
  }

  area.innerHTML = html;
}

function renderPlacesInMonth(rows){
  const by = {};

  rows.forEach(r => {
    const key = r.place || "未入力";
    if(!by[key]) by[key] = [];
    by[key].push(r);
  });

  return Object.keys(by).map(place => {
    const pr = by[place];

    return `
      <details class="fold">
        <summary class="foldHead">${escapeHtml(place)}　${yen(sum(pr,"sales"))}</summary>
        <div class="foldBody">
          ${groupByDayPlace(pr).map(g => dayFold(g,false)).join("")}
        </div>
      </details>
    `;
  }).join("");
}

function groupByDayPlace(rows){
  const map = {};

  rows.forEach(r => {
    const key = r.date + "|" + r.place;

    if(!map[key]){
      const cost = getCostUnit(r);
      const count = Number(r.count || 0);
      const back = Number(r.back || 0);

      map[key] = {
        date: r.date,
        place: r.place,
        weather: r.weather,
        rows: [],
        total: 0,
        cost: cost,
        count: count,
        costTotal: cost * count,
        back: back
      };
    }

    map[key].rows.push(r);
    map[key].total += Number(r.sales || 0);
  });

  return Object.values(map);
}

function getCostUnit(r){
  if(r.costUnit !== undefined) return Number(r.costUnit || 0);
  if(r.cost !== undefined) return Number(r.cost || 0);
  return 0;
}

function sum(rows,key){
  return rows.reduce((a,r) => a + Number(r[key] || 0), 0);
}

function yen(n){
  return Number(n || 0).toLocaleString() + "円";
}

function weekday(date){
  const d = new Date(date);
  return ["日","月","火","水","木","金","土"][d.getDay()] || "";
}

function localDate(){
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0,10);
}

function escapeHtml(s){
  return String(s || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

function escapeAttr(s){
  return String(s || "").replace(/\\/g,"\\\\").replace(/'/g,"\\'");
}
</script>
</body>
</html>
