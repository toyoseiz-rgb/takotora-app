<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>たこ虎 売上管理</title>
<meta name="theme-color" content="#ffd000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="たこ虎">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=10">

<style>
:root{--yellow:#ffd000;--gold:#b88600;--black:#111}
*{box-sizing:border-box}
body{margin:0;background:#111;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;color:#111}
.header{position:sticky;top:0;z-index:50;background:linear-gradient(#ffe45c,#ffd000);border-bottom:6px solid var(--gold);padding:16px;text-align:center}
.header h1{margin:0;font-size:30px;font-weight:900}
.wrap{max-width:560px;margin:auto;padding:16px}
.card{background:#fff;border-radius:28px;padding:20px;margin:14px 0 22px;box-shadow:0 4px 18px rgba(0,0,0,.25)}
.logo{width:140px;height:140px;display:block;margin:14px auto;border-radius:32px}
.lockTitle{font-size:42px;font-weight:900;text-align:center;line-height:1.12}
.sub{text-align:center;font-size:20px;font-weight:800;color:#666;margin:12px 0}
label{display:block;font-size:20px;font-weight:900;margin:15px 0 8px}
input,select,textarea{width:100%;padding:15px;font-size:21px;border-radius:17px;border:2px solid #ddd;background:#fff}
textarea{height:82px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:18px;border:none;border-radius:22px;background:var(--yellow);font-size:29px;font-weight:900;box-shadow:0 7px var(--gold);margin-top:18px}
.btnMini{padding:11px 12px;border:none;border-radius:14px;background:var(--yellow);font-size:18px;font-weight:900;box-shadow:0 4px var(--gold);margin-top:10px}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.tab{background:#fff;border:none;border-radius:16px;padding:13px 6px;font-size:18px;font-weight:900;box-shadow:0 4px #aaa}
.tab.active{background:var(--yellow);box-shadow:0 4px var(--gold)}
.hidden{display:none!important}
.notice{font-size:15px;background:#fff7c7;border:2px solid #ffd000;border-radius:14px;padding:10px;margin:10px 0;font-weight:900}
.itemBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.itemBtn,.linkBtn{border:none;background:#111;color:#ffd000;border-radius:14px;padding:12px;font-size:17px;font-weight:900;margin:3px}
.status{text-align:center;font-size:28px;font-weight:900;margin-top:14px}
.addedBox{border:2px solid #eee;border-radius:16px;padding:10px;margin:12px 0;background:#fafafa}
.addedRow{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;border-bottom:1px solid #ddd;padding:8px 0;font-size:17px;font-weight:800}
.addedRow:last-child{border-bottom:none}
.delBtn{border:none;border-radius:10px;background:#111;color:#ffd000;font-weight:900;padding:8px 10px}
.fold{background:#fff;border:2px solid #eee;border-radius:18px;padding:12px;margin:10px 0}
.foldHead{font-size:18px;font-weight:900;cursor:pointer;list-style:none}
.foldHead::-webkit-details-marker{display:none}
.foldBody{margin-top:10px;border-top:1px solid #eee;padding-top:10px}
.line{display:flex;justify-content:space-between;gap:12px;padding:5px 0;font-size:16px}
.leftLine{display:flex;align-items:center;gap:10px;min-width:0}
.itemName{display:inline-block;min-width:82px;font-weight:800}
.line b{font-size:18px;white-space:nowrap}
.summary{font-size:22px;font-weight:900;line-height:1.65;margin-bottom:12px}
.expenseLine{font-size:16px;font-weight:900;padding-top:8px}
hr{border:none;border-top:1px solid #eee;margin:10px 0}
</style>
</head>

<body>
<div class="header"><h1>たこ虎 売上管理</h1></div>

<div class="wrap">

<section id="lockScreen" class="card">
  <img src="icon.png.png?v=20" class="logo">
  <div class="lockTitle">たこ虎 売上管理</div>
  <div class="sub">暗証番号を入力</div>
  <input type="password" id="pinInput" inputmode="numeric" maxlength="4" placeholder="＊＊＊＊">
  <button class="btn" onclick="unlock()">開く</button>
</section>

<section id="mainScreen" class="hidden">

  <div class="tabs">
    <button id="tabInput" class="tab active" onclick="showScreen('input')">入力</button>
    <button id="tabDaily" class="tab" onclick="showScreen('daily')">日別</button>
    <button id="tabYearly" class="tab" onclick="showScreen('yearly')">年間</button>
  </div>

  <section id="inputScreen">
    <div class="card">

      <label>日付</label>
      <input type="date" id="date">

      <label>現場名</label>
      <input type="text" id="place" list="placeList" placeholder="例：浅間">
      <datalist
<datalist id="placeList"></datalist>

<div class="row">
  <div>
    <label>天気</label>
    <select id="weather">
      <option>晴</option>
      <option>曇</option>
      <option>雨</option>
      <option>小雨</option>
      <option>大雨</option>
      <option>台風</option>
    </select>
  </div>

  <div>
    <label>風</label>
    <select id="wind">
      <option>なし</option>
      <option>風あり</option>
      <option>強風</option>
    </select>
  </div>
</div>

<div id="itemButtons" class="itemBtns"></div>

<div id="itemsArea"></div>

<button class="btnMini" onclick="addItemRow()">品目を追加</button>

<div class="row">
  <div>
    <label>経費単価</label>
    <input type="number" id="costUnit">
  </div>

  <div>
    <label>本数</label>
    <input type="number" id="count">
  </div>
</div>

<label>返し</label>
<input type="number" id="back">

<label>メモ</label>
<textarea id="memo"></textarea>

<button class="btn" onclick="save()">保存する</button>

<div class="status" id="status"></div>

</div>
</section>

<section id="dailyScreen" class="hidden">
  <div class="card">
    <div class="notice">
      日別は確認専用。最新が上、直近だけ開きます。
    </div>

    <div id="dailyArea"></div>
  </div>
</section>

<section id="yearlyScreen" class="hidden">
  <div class="card">
    <div id="yearlyArea"></div>
  </div>
</section>

</section>
</div>

<script>

const API_URL = "YOUR_GAS_URL";

let allRows = [];
let siteMaster = [];
let itemMaster = [];

const itemRows = [];

function unlock(){
  if(document.getElementById("pinInput").value !== "1010"){
    alert("暗証番号が違います");
    return;
  }

  document.getElementById("lockScreen").classList.add("hidden");
  document.getElementById("mainScreen").classList.remove("hidden");

  init();
}

function showScreen(type){

  ["input","daily","yearly"].forEach(v=>{
    document.getElementById(v+"Screen").classList.add("hidden");
    document.getElementById("tab"+capitalize(v)).classList.remove("active");
  });

  document.getElementById(type+"Screen").classList.remove("hidden");
  document.getElementById("tab"+capitalize(type)).classList.add("active");

}

function capitalize(v){
  return v.charAt(0).toUpperCase()+v.slice(1);
}

async function init(){

  document.getElementById("date").value =
    new Date().toISOString().split("T")[0];

  const res = await fetch(API_URL + "?action=init");
  const data = await res.json();

  siteMaster = data.sites || [];
  itemMaster = data.items || [];
  allRows = data.rows || [];

  renderPlaces();
  renderTopButtons();

  addItemRow();

  renderDaily();
  renderYearly();

}
  function renderPlaces(){

  document.getElementById("placeList").innerHTML =
    siteMaster.map(v =>
      `<option value="${escapeHtml(v.name)}">`
    ).join("");

}

function renderTopButtons(){

  let top = [...itemMaster];

  const hasCount =
    top.some(v => Number(v.count || 0) > 0);

  if(hasCount){

    top.sort((a,b)=>
      Number(b.count || 0)
      - Number(a.count || 0)
    );

  }

  top = top.slice(0,10);

  document.getElementById("itemButtons").innerHTML =
    top.map(v => `
      <button
        class="itemBtn"
        onclick="quickItem('${escapeAttr(v.name)}')"
      >
        ${escapeHtml(v.name)}
      </button>
    `).join("");

}

function quickItem(name){

  const last =
    document.querySelector(".itemName:last-of-type");

  if(last){
    last.value = name;
  }

}

function addItemRow(){

  itemRows.push({
    item:"",
    sales:"",
    staff:""
  });

  renderItemRows();

}

function renderItemRows(){

  document.getElementById("itemsArea").innerHTML =
    itemRows.map((v,i)=>`

      <div class="addedBox">

        <label>品目</label>

        <input
          class="itemName"
          value="${escapeHtml(v.item)}"
          onchange="updateItem(${i},this.value)"
          list="itemList"
        >

        <label>売上</label>

        <input
          type="number"
          value="${escapeHtml(v.sales)}"
          onchange="updateSales(${i},this.value)"
        >

        <label>担当</label>

        <input
          value="${escapeHtml(v.staff)}"
          onchange="updateStaff(${i},this.value)"
        >

        ${
          itemRows.length > 1
          ? `
            <button
              class="delBtn"
              onclick="removeItem(${i})"
            >
              削除
            </button>
          `
          : ""
        }

      </div>

    `).join("");

  renderItemList();

}

function renderItemList(){

  let html =
    `<datalist id="itemList">`;

  html += itemMaster.map(v=>
    `<option value="${escapeHtml(v.name)}">`
  ).join("");

  html += `</datalist>`;

  document.body.insertAdjacentHTML(
    "beforeend",
    html
  );

}

function updateItem(i,v){
  itemRows[i].item = v;
}

function updateSales(i,v){
  itemRows[i].sales = v;
}

function updateStaff(i,v){
  itemRows[i].staff = v;
}

function removeItem(i){

  itemRows.splice(i,1);

  renderItemRows();

}
  async function save(){

  const rows = itemRows.filter(v =>
    v.item || v.sales || v.staff
  );

  if(!rows.length){
    alert("品目を入力してください");
    return;
  }

  const body = {
    date:
      document.getElementById("date").value,

    place:
      document.getElementById("place").value,

    weather:
      document.getElementById("weather").value,

    wind:
      document.getElementById("wind").value,

    costUnit:
      document.getElementById("costUnit").value,

    count:
      document.getElementById("count").value,

    back:
      document.getElementById("back").value,

    memo:
      document.getElementById("memo").value,

    items: rows
  };

  document.getElementById("status").innerText =
    "保存中...";

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify(body)
  });

  document.getElementById("status").innerText =
    "保存完了";

  location.reload();

}

function renderDaily(){

  document.getElementById("dailyArea").innerHTML =
    "<div class='notice'>読み込み済み</div>";

}

function renderYearly(){

  document.getElementById("yearlyArea").innerHTML =
    "<div class='notice'>読み込み済み</div>";

}

function escapeHtml(v){

  return String(v || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");

}

function escapeAttr(v){

  return String(v || "")
    .replace(/\\/g,"\\\\")
    .replace(/'/g,"\\'");

}

</script>
</body>
</html>
